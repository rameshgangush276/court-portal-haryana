databases:
  - name: court-portal-db
    plan: free
    databaseName: court_portal
    user: court_portal_user

services:
  - type: web
    name: court-portal
    plan: free
    runtime: node
    buildCommand: npm install && npm run render:build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: court-portal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
